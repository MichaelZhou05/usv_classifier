# ─────────────────────────────────────────────────────────────────────────────
# USV Classifier — ablation config tuned for longer GPU runs
# ─────────────────────────────────────────────────────────────────────────────
data_directory: "../data/usv_recordings"
squeakout_weights: "../squeakout/squeakout_weights.ckpt"
output_directory: "./outputs"

encoder:
  extraction_point: "x4"
  device: "cuda"
  batch_size: 1024

spectrogram:
  window_duration_sec: 0.30
  freq_min: 30000    # Hz — lower bound of USV frequency range
  freq_max: 130000   # Hz — upper bound of USV frequency range
  n_fft: 512
  hop_length: 64

pooler: "swe"

swe:
  num_slices: 256
  num_ref_points: 90
  freeze_swe: false
  flatten: false

augmentation:
  enabled: true
  strategy: "noise"
  n_sources: 2
  target_multiplier: 1.0
  noise_std: 0.10
  random_seed: 42

n_classes: 2

model:
  hidden_dims: [64]
  dropout: 0.2
  use_batch_norm: false
  use_class_weights: true

training:
  n_epochs: 400
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0005
  early_stopping_patience: 50
  cpu_model_eval_every: 10

splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
  stratify: true

normalize_features: true

finetune:
  finetune_from_block: 10   # unfreeze blocks 10-13 for x4 extraction point
  lr_encoder: 0.00001       # very low lr to preserve pretrained features
  lr_classifier: 0.001
