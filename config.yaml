# USV Disease Classifier Configuration
# =====================================

# Data settings
mat_directory: "../DeepSqueak__output"  # Path to DeepSqueak MAT files
labels_csv: "../labels.csv"              # Path to labels file (optional if labels in filenames)

# Feature settings
n_max_calls: 50            # Max calls per sample (reduced from 150)
n_features: 5              # Features per call: [start_time, low_freq, duration, bandwidth, score]
include_score: true        # Include detection score as feature
normalize: true            # Z-score normalize features

# Model settings
model_type: "mlp"              # "mlp", "attention", or "summary"
hidden_dims: [32, 16]          # Much smaller network for small dataset
dropout: 0.5                   # Higher dropout to prevent overfitting
use_batch_norm: false          # Disable for small batches

# Training settings
n_epochs: 200
batch_size: 8                  # Smaller batch size
learning_rate: 0.0001          # Slower learning rate
weight_decay: 0.01             # More regularization
use_class_weights: true        # Handle class imbalance
early_stopping_patience: 30    # More patience

# Data splits
train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15
seed: 42

# Output
output_dir: "outputs"
