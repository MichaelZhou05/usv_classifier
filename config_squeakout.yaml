# ─────────────────────────────────────────────────────────────────────────────
# USV Classifier — SqueakOut latent-feature pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Uses the SqueakOut encoder's deep representations (1280-dim per call) instead
# of hand-crafted summary statistics (duration, freq, slope, etc.).

# ── Paths ─────────────────────────────────────────────────────────────────────
data_directory: "../data/usv_recordings"    # contains *.wav + *.csv pairs
squeakout_weights: "../squeakout/squeakout_weights.ckpt"
output_directory: "./outputs"

# ── SqueakOut encoder ─────────────────────────────────────────────────────────
encoder:
  # Which depth to extract from the MobileNetV2 backbone:
  #   'deep'  → 1280-dim  (default; highest information, most parameters)
  #   'x4'    →   96-dim  (good for very small datasets, less overfitting)
  #   'x3'    →   32-dim  (lightest; comparable to current 11 hand-crafted feats)
  #   'multi' → 1408-dim  (multi-scale, richest but largest input to classifier)
  extraction_point: "x4"
  device: "cpu"                # set to "cuda" or "mps" if available
  batch_size: 16               # spectrograms per forward pass

# ── Spectrogram generation ────────────────────────────────────────────────────
spectrogram:
  # Fixed time window per call. All calls shorter than this are zero-padded;
  # calls longer are centre-cropped. 300ms covers virtually all mouse USV calls.
  window_duration_sec: 0.30
  freq_min: 30000              # Hz — lower bound of USV frequency crop
  freq_max: 130000             # Hz — upper bound
  n_fft: 512
  hop_length: 64

# ── Pooling ───────────────────────────────────────────────────────────────────
# Aggregates the per-call feature vectors into one vector per recording.
# Primary options: "swe" (best, learns optimal transport embedding)
#                  "average" (fast baseline, good for tiny datasets)
pooler: "average"

# SWE-specific settings (only used when pooler = "swe")
swe:
  # n_features is set automatically to encoder.output_dim at runtime
  num_slices: 16               # number of random projection directions
  num_ref_points: 10           # resolution of the CDF approximation
  freeze_swe: false            # true = fixed random projections (faster)
  flatten: true                # output dim = num_slices * num_ref_points

# ── Class-balance augmentation ────────────────────────────────────────────────
augmentation:
  enabled: true
  # strategy: "mixing"  — cross-litter call mixing (recommended)
  #           "noise"   — Gaussian noise on cloned recordings (legacy)
  strategy: "mixing"
  # Cross-litter mixing parameters (used when strategy = "mixing"):
  #   n_sources:         recordings to combine per synthetic (2 = pairs, 3 = triples)
  #   target_multiplier: 1.0 = balance to majority class; 3.0 = 3× majority
  n_sources: 2
  target_multiplier: 1.0
  # Noise parameters (used when strategy = "noise"):
  noise_std: 0.05
  random_seed: 42
  # NOTE: augmentation is applied only to the training split.
  # Val and test sets always use real data only.

# ── Classification model ──────────────────────────────────────────────────────
n_classes: 2                   # 0=healthy (wildtype+het), 1=twitcher

model:
  # Input dim is computed at runtime as pooler.output_dim
  # average + x4: 96-dim input
  hidden_dims: [64]            # tiny: 56 training samples can't support more
  dropout: 0.2
  use_batch_norm: false        # BatchNorm unstable on tiny datasets
  use_class_weights: true      # re-weight loss by inverse class frequency

# ── Training ──────────────────────────────────────────────────────────────────
training:
  n_epochs: 300
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 40

# ── Data splits ───────────────────────────────────────────────────────────────
splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
  stratify: true

normalize_features: true
